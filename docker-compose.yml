services:
  db:
    image: postgres:18.4-alpine
    container_name: expense-tracker-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: expense_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d expense_tracker"]
      interval: 2s
      timeout: 2s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev

    command: >
      sh -c "pnpm db:migrate &&
             pnpm dev:api"

    container_name: expense-tracker-api

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - contracts_node_modules:/app/packages/contracts/node_modules

    env_file:
      - apps/api/.env

    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://user:password@db:5432/expense_tracker
      LOG_LEVEL: debug

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  root_node_modules:
  api_node_modules:
  contracts_node_modules: