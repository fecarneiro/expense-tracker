services:
  db:
    image: postgres:18.4-alpine
    container_name: expense-tracker-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: expense_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d expense_tracker"]
      interval: 2s
      timeout: 2s
      retries: 5

  contracts:
    build:
      context: .
      dockerfile: Dockerfile.dev

    command: >
      sh -c "pnpm build &&
             exec ./node_modules/.bin/tsc -p tsconfig.json --watch --preserveWatchOutput"

    container_name: expense-tracker-contracts
    init: true
    working_dir: /app/packages/contracts

    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - contracts_node_modules:/app/packages/contracts/node_modules

    healthcheck:
      test: ["CMD-SHELL", "test -f dist/index.js"]
      interval: 1s
      timeout: 1s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev

    command: >
      sh -c "pnpm db:migrate &&
             exec ./node_modules/.bin/tsx watch --env-file=.env src/server.ts"

    container_name: expense-tracker-api
    init: true
    working_dir: /app/apps/api

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - contracts_node_modules:/app/packages/contracts/node_modules

    env_file:
      - apps/api/.env

    environment:
      CI: "true"
      NODE_ENV: development
      DATABASE_URL: postgresql://user:password@db:5432/expense_tracker
      LOG_LEVEL: debug

    depends_on:
      db:
        condition: service_healthy
      contracts:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev

    command: pnpm dev --host 0.0.0.0

    container_name: expense-tracker-web
    working_dir: /app/apps/web

    ports:
      - "5173:5173"

    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - contracts_node_modules:/app/packages/contracts/node_modules

    environment:
      API_PROXY_TARGET: http://api:3000

    depends_on:
      api:
        condition: service_started
      contracts:
        condition: service_healthy

volumes:
  postgres_data:
  root_node_modules:
  api_node_modules:
  web_node_modules:
  contracts_node_modules:
